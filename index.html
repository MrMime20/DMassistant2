<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surgical Editor.js Build</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>

    <style>
        .editor-container { max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; min-height: 300px; }
    </style>
</head>
<body>

    <div class="editor-container">
        <div id="editorjs"></div>
    </div>

    <script>
        // Slower, safer initiation
        window.addEventListener('load', () => {
            
            // Helper to get class or return a "dummy" to prevent crash
            const getTool = (toolName) => {
                const tool = window[toolName];
                if (!tool) {
                    console.warn(`Plugin ${toolName} failed to load. Skipping it.`);
                    return null; 
                }
                return tool;
            };

            const tools = {
                header: getTool('Header'),
                list: getTool('List'),
                quote: getTool('Quote'),
                table: getTool('Table')
            };

            // Remove nulls so Editor.js doesn't freak out
            Object.keys(tools).forEach(key => tools[key] === null && delete tools[key]);

            const editor = new EditorJS({
                holder: 'editorjs',
                tools: tools,
                onReady: () => console.log('Editor.js is ready!'),
                onError: (e) => console.error('Editor.js error:', e)
            });
        });
    </script>
</body>
</html>
