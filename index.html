<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fully Verified Editor.js</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>

    <style>
        .editor-container { max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="editor-container">
        <div id="editorjs"></div>
    </div>

    <script>
        // This function forces the code to wait until the browser has finished 
        // downloading and parsing the plugin scripts.
        async function initEditor() {
            // Wait for a tiny tick to ensure window objects are populated
            await new Promise(resolve => setTimeout(resolve, 500));

            // Verify they exist
            if (!window.Header || !window.List || !window.Quote) {
                console.error("Plugins failed to load into window object!");
                return;
            }

            const editor = new EditorJS({
                holder: 'editorjs',
                tools: {
                    header: window.Header,
                    list: window.List,
                    quote: window.Quote,
                    table: window.Table,
                    code: window.Code
                },
                onReady: () => console.log('Editor.js mounted successfully!')
            });
        }

        // Trigger the loader
        initEditor().catch(console.error);
    </script>
</body>
</html>
