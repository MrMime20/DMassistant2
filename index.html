<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Production Editor.js</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-alert@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-text-color-plugin@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-alignment-blocktune@latest"></script>

    <style>
        .editor-container { max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="editor-container">
        <div id="editorjs"></div>
    </div>

    <script>
        // The Guard: Returns the plugin class only when it exists, otherwise logs a warning
        const getPlugin = (name) => {
            const plugin = window[name];
            if (!plugin) console.warn(`Plugin ${name} not found yet!`);
            return plugin;
        };

        const editor = new EditorJS({
            holder: 'editorjs',
            tunes: ['alignmentTune'],
            tools: {
                alignmentTune: { class: getPlugin('AlignmentBlockTune') },
                header: { class: getPlugin('Header'), tunes: ['alignmentTune'] },
                list: { class: getPlugin('List') },
                quote: { class: getPlugin('Quote'), tunes: ['alignmentTune'] },
                alert: { class: getPlugin('Alert') },
                table: { class: getPlugin('Table') },
                code: { class: getPlugin('Code') },
                Color: { 
                    class: getPlugin('ColorPlugin'),
                    config: { colorCollections: ['#FF1300', '#000000'] } 
                }
            },
            onReady: () => console.log('Editor initialized safely.')
        });
    </script>
</body>
</html>
